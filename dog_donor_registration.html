<!DOCTYPE html>
<html>
<head>
    <title>Dog Donor Registration</title>
</head>
<body>

<h2>Dog Donor Registration Form</h2>

<form>

Owner Name:
<input type="text" name="ownername"><br><br>

Dog Name:
<input type="text" name="dogname"><br><br>

Breed:
<input type="text" name="breed"><br><br>

Age:
<input type="number" name="age"><br><br>

Weight:
<input type="number" name="weight"><br><br>

Gender:
<select name="gender">
<option>Male</option>
<option>Female</option>
</select><br><br>

Blood Type:
<input type="text" name="bloodtype"><br><br>

Vaccination Status:
<input type="checkbox"> Vaccinated<br><br>

Health Declaration:
<input type="checkbox"> My dog is healthy and fit to donate blood<br><br>

<input type="submit" value="Register Dog">

</form>

</body>
</html>
